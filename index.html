<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dosis:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../sass/main.css">
    <title>Moonrunner Games | Home</title>
  </head>

  <body>
    <!-- Hero -->
    <section class="hero" id="home">
      <!-- logo container img and h1 -->
      <div class="hero-logo-box">
        <img
          src="./img/mascotEdit.png"
          alt="Moonrunner Games logo"
          class="hero-logo"
        />
        <h1 class="hero-logo-heading">Moonrunner <br />Games</h1>
      </div>

      <div class="hero-navBar">
        <!-- Add active ID remove btn-white class -->
        <ul class="nav-menu">
          <li class="nav-item">
            <a href="index.html" id="active" class="btn hero-btn">Home</a>
          </li>
          <li class="nav-item">
            <a href="/html/games.html" class="btn hero-btn btn-white">Games</a>
          </li>
          <li class="nav-item">
            <a href="/html/about.html" class="btn hero-btn btn-white">About</a>
          </li>
          <li class="nav-item">
            <a href="/html/contact.html" class="btn hero-btn btn-white">Contact</a>
          </li>
        </ul>
        <ul class="hamburger__nav-menu" id="ulBurger">
          <li class="hamburger__nav-item">
            <a href="index.html" class="nav-link" data-text="Home">Home</a>
          </li>
          <li class="hamburger__nav-item">
            <a href="/html/games.html" class="nav-link" data-text="Games">Games</a>
          </li>
          <li class="hamburger__nav-item">
            <a href="/html/about.html" class="nav-link" data-text="About">About</a>
          </li>
          <li class="hamburger__nav-item">
            <a href="/html/contact.html" class="nav-link" data-text="Contact"
              >Contact</a
            >
          </li>
        </ul>

        <div class="hamburger">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>
      <div class="hero-heading-text">
        <h3 class="footprints glow">
          Don't say<br />
          the sky's the limit <br />
          when there are<br />
          footprints <br />
          on the moon
        </h3>
      </div>
    </section>

    <!-- Scripts -->
    <script
      src="https://kit.fontawesome.com/e4f739f6f0.js"
      crossorigin="anonymous"
    ></script>
    <script src="/hamburger.js"></script>
  </body>
